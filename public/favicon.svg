<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111418" />
      <stop offset="100%" stop-color="#222a34" />
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe08a" stop-opacity=".42" />
      <stop offset="100%" stop-color="#79b8ff" stop-opacity=".12" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#glow)"/>
  <path d="M7 54 Q32 46 57 54" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="2"/>

  <g filter="url(#shadow)" stroke="#101214" stroke-linejoin="round" stroke-linecap="round">
    <!-- Top face (yellow) -->
    <g>
      <polygon points="32,11 47,18.5 32,26 17,18.5" fill="#f3e400" stroke-width="1.8"/>
      <path d="M27 13.5 L42 21" stroke-width="1.2" fill="none"/>
      <path d="M22 16 L37 23.5" stroke-width="1.2" fill="none"/>
      <path d="M37 13.5 L22 21" stroke-width="1.2" fill="none"/>
      <path d="M42 16 L27 23.5" stroke-width="1.2" fill="none"/>
    </g>

    <!-- Left/front face (red) -->
    <g>
      <polygon points="17,18.5 32,26 32,44 17,36.5" fill="#e53935" stroke-width="1.8"/>
      <path d="M22 21 L22 39.5" stroke-width="1.2" fill="none"/>
      <path d="M27 23.5 L27 42" stroke-width="1.2" fill="none"/>
      <path d="M17 24.5 L32 32" stroke-width="1.2" fill="none"/>
      <path d="M17 30.5 L32 38" stroke-width="1.2" fill="none"/>
    </g>

    <!-- Right face (blue) -->
    <g>
      <polygon points="47,18.5 32,26 32,44 47,36.5" fill="#2f6dff" stroke-width="1.8"/>
      <path d="M42 21 L42 39.5" stroke-width="1.2" fill="none"/>
      <path d="M37 23.5 L37 42" stroke-width="1.2" fill="none"/>
      <path d="M47 24.5 L32 32" stroke-width="1.2" fill="none"/>
      <path d="M47 30.5 L32 38" stroke-width="1.2" fill="none"/>
    </g>

    <!-- Edge highlights -->
    <path d="M32 11 L47 18.5 L47 36.5 L32 44 L17 36.5 L17 18.5 Z" fill="none" stroke="#f8fbff" stroke-opacity=".16" stroke-width=".9"/>
  </g>
</svg>
